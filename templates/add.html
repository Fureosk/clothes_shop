<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить товар</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ 'dark' if dark else '' }}">
    <header>
        <a href="/" style="text-decoration:none; color:inherit;"><h1>👗 Fureoska</h1></a>
        <div class="header-right">
            <a href="/" class="icon-btn">← Назад</a>
        </div>
    </header>

    <div class="form-container">
        <h2 style="margin-bottom:20px;">➕ Добавить товар</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="flash flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label>Название товара</label>
            <input type="text" name="name" placeholder="Например: Пуховик зимний" required>

            <label>Цена (₽)</label>
            <input type="number" name="price" placeholder="Например: 3999" min="1" required>

            <label>Категория</label>
            <select name="category" id="category" onchange="updateSubcategories()">
                <option>Мужская</option>
                <option>Женская</option>
                <option>Детская</option>
            </select>

            <label>Подкатегория</label>
            <select name="subcategory" id="subcategory"></select>

            <label>Описание</label>
            <textarea name="description" placeholder="Краткое описание товара" style="height:80px;"></textarea>

            <label>Фото товара</label>
            <div class="photo-upload-wrap">
                <input type="file" name="photo" accept=".png,.jpg,.jpeg,.gif,.webp" id="photoInput" onchange="previewPhoto(event)">
                <div id="photo-preview" class="photo-preview" style="display:none;">
                    <img id="preview-img" src="" alt="Превью">
                    <button type="button" onclick="clearPhoto()" class="clear-photo-btn">✕ Удалить</button>
                </div>
                <p class="upload-hint">PNG, JPG, GIF или WEBP · до 5 МБ</p>
            </div>

            <button type="submit" class="btn" style="width:100%; margin-top:20px; padding:14px; font-size:15px;">
                Добавить товар
            </button>
        </form>
    </div>
<script src="/static/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Fureoska</title>
    <meta name="description" content="Создайте аккаунт на Fureoska">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ theme }}">
    <header>
        <a href="/" style="text-decoration:none; color:inherit;"><h1>👗 Fureoska</h1></a>
        <div class="header-right">
            <div class="theme-picker">
            <a href="/set-theme/light" class="theme-opt light-opt" title="Светлая">☀️</a>
            <a href="/set-theme/dark"  class="theme-opt dark-opt"  title="Тёмная">🌙</a>
            <a href="/set-theme/pink"  class="theme-opt pink-opt"  title="Розовая">🌸</a>
        </div>
            <a href="javascript:history.back()" class="icon-btn">← Назад</a>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-box">
            <h2>Создать аккаунт</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for cat, msg in messages %}
                <div class="flash flash-{{ cat }}">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label>Логин</label>
                <input type="text" name="username" placeholder="username" required>

                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com" required>

                <label>Пароль</label>
                <input type="password" name="password" placeholder="Минимум 6 символов" autocomplete="new-password" required>

                <label>Тип аккаунта</label>
                <div class="role-picker">
                    <label class="role-card">
                        <input type="radio" name="role" value="buyer" checked>
                        <span>
                            <strong>🛍️ Покупатель</strong>
                            <small>Покупаю одежду</small>
                        </span>
                    </label>
                    <label class="role-card">
                        <input type="radio" name="role" value="seller">
                        <span>
                            <strong>🏪 Продавец</strong>
                            <small>Продаю одежду</small>
                        </span>
                    </label>
                </div>

                <div id="seller-fields" style="display:none;">
                    <label>Название магазина</label>
                    <input type="text" name="shop_name" placeholder="Например: StyleHub">

                    <label>Описание магазина</label>
                    <textarea name="shop_desc" placeholder="Пару слов о вашем магазине" style="height:70px;"></textarea>
                </div>

                <button type="submit" class="btn" style="width:100%; margin-top:20px; padding:12px;">
                    Зарегистрироваться
                </button>
            </form>

            <p class="auth-switch">Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>
<script src="/static/main.js" defer></script>
</body>
</html>

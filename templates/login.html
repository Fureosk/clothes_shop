<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Fureoska</title>
    <meta name="description" content="Войдите в аккаунт Fureoska">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ theme }}">
    <header>
        <a href="/" style="text-decoration:none; color:inherit;"><h1>👗 Fureoska</h1></a>
        <div class="header-right">
            <div class="theme-picker">
            <a href="/set-theme/light" class="theme-opt light-opt" title="Светлая">☀️</a>
            <a href="/set-theme/dark"  class="theme-opt dark-opt"  title="Тёмная">🌙</a>
            <a href="/set-theme/pink"  class="theme-opt pink-opt"  title="Розовая">🌸</a>
        </div>
            <a href="javascript:history.back()" class="icon-btn">← Назад</a>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-box">
            <h2>Войти в аккаунт</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for cat, msg in messages %}
                <div class="flash flash-{{ cat }}">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label>Логин или Email</label>
                <input type="text" name="login" placeholder="username или email" required>

                <label>Пароль</label>
                <input type="password" name="password" placeholder="Пароль" autocomplete="current-password" required>

                <button type="submit" class="btn" style="width:100%; margin-top:20px; padding:12px;">
                    Войти
                </button>
            </form>

            <p class="auth-switch">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
        </div>
    </div>
<script src="/static/main.js" defer></script>
</body>
</html>
